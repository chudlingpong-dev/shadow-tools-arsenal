<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shadow Tools Arsenal — 800+ Free Web Tools</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <span class="logo-icon">⚡</span>
                <span class="logo-text">Shadow<span class="highlight">Tools</span></span>
                <span class="logo-badge">800+</span>
            </div>
            <div class="header-actions">
                <button id="themeToggle" class="theme-btn" aria-label="Toggle theme">🌙</button>
            </div>
        </div>
    </header>

    <!-- Hero -->
    <section class="hero">
        <div class="container">
            <h1>800+ Free Web Tools</h1>
            <p>Everything you need to build, test, secure, and optimize your digital presence.</p>
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="Search 800+ tools..." class="search-input" />
                <span class="search-icon">🔍</span>
            </div>
            <div class="filter-tags" id="filterTags">
                <button class="filter-btn active" data-category="all">All</button>
                <button class="filter-btn" data-category="seo">SEO</button>
                <button class="filter-btn" data-category="security">Security</button>
                <button class="filter-btn" data-category="performance">Performance</button>
                <button class="filter-btn" data-category="design">Design</button>
                <button class="filter-btn" data-category="developer">Developer</button>
                <button class="filter-btn" data-category="converter">Converters</button>
                <button class="filter-btn" data-category="generator">Generators</button>
                <button class="filter-btn" data-category="testing">Testing</button>
                <button class="filter-btn" data-category="analytics">Analytics</button>
            </div>
        </div>
    </section>

    <!-- Tools Grid -->
    <main class="main-content">
        <div class="container">
            <div class="tools-grid" id="toolsGrid">
                <!-- Tools will be rendered here by JavaScript -->
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>Shadow Tools Arsenal — Built with ❤️ by the Shadow</p>
            <p class="footer-small">800+ tools • Free • No sign-up required</p>
        </div>
    </footer>

    <script src="js/tools-data.js"></script>
    <script src="js/app.js"></script>
    <script src="js/search.js"></script>
</body>
</html>
